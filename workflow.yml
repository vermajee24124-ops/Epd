name: PocketFM Qwen Transcript Batch 20

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pocketfm-qwen-transcript-batch20
  cancel-in-progress: false

jobs:
  transcribe:
    name: Transcribe Episode 1-200
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout public runner repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Transcribe Episode 1-200 in private HF batches
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python main.py
