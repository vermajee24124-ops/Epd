name: Veda Continuity Builder

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: veda-continuity-builder
  cancel-in-progress: false

jobs:
  build:
    name: Clean + Boundary Fix + Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Veda Continuity Builder
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          HF_SOURCE_REPO_ID: ${{ vars.HF_SOURCE_REPO_ID }}
          HF_SOURCE_REPO_TYPE: ${{ vars.HF_SOURCE_REPO_TYPE }}
          HF_SOURCE_FOLDER: ${{ vars.HF_SOURCE_FOLDER }}
          HF_OUTPUT_REPO_ID: ${{ vars.HF_OUTPUT_REPO_ID }}
          HF_OUTPUT_REPO_TYPE: ${{ vars.HF_OUTPUT_REPO_TYPE }}
          HF_OUTPUT_FOLDER: ${{ vars.HF_OUTPUT_FOLDER }}

          BATCH_SIZE: ${{ vars.BATCH_SIZE }}
          REQUEST_DELAY_SECONDS: ${{ vars.REQUEST_DELAY_SECONDS }}
          RETRY_BASE_SECONDS: ${{ vars.RETRY_BASE_SECONDS }}
          MAX_RETRIES: ${{ vars.MAX_RETRIES }}

          CLEAN_MODEL: ${{ vars.CLEAN_MODEL }}
          ANALYSIS_MODEL: ${{ vars.ANALYSIS_MODEL }}
        run: |
          python -u main.py
