name: PocketFM Batch TXT Transcription

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pocketfm-batch-txt
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check FFmpeg
        run: |
          command -v ffmpeg
          ffmpeg -version | head -n 1
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run transcription
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_BASE_URL: ${{ vars.QWEN_BASE_URL }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
          HF_SOURCE_FOLDER: ${{ vars.HF_SOURCE_FOLDER }}
          HF_OUTPUT_FOLDER: ${{ vars.HF_OUTPUT_FOLDER }}
          BATCH_SIZE: ${{ vars.BATCH_SIZE }}
          REQUEST_DELAY_SECONDS: ${{ vars.REQUEST_DELAY_SECONDS }}
          RETRY_BASE_SECONDS: ${{ vars.RETRY_BASE_SECONDS }}
          MAX_RETRIES: ${{ vars.MAX_RETRIES }}
          ENABLE_THINKING: ${{ vars.ENABLE_THINKING }}
          QWEN_MODELS: ${{ vars.QWEN_MODELS }}
        run: python -u main.py
