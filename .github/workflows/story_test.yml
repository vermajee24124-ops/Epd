name: Test Models for Story Generation

on:
  workflow_dispatch: # Actions टैब से मैन्युअल रन करने के लिए

permissions:
  contents: write # रिजल्ट फाइल को रेपो में कमिट करने की परमिशन

jobs:
  run-story-generation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Required for OmniRoute)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OmniRoute Gateway
        run: npm install -g omniroute

      - name: Start OmniRoute Background Server
        run: |
          omniroute & 
          echo "OmniRoute चालू हो रहा है, 15 सेकंड का इंतज़ार..."
          sleep 15
          curl -s http://localhost:20128/v1/models > /dev/null || echo "Server check bypass"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Requests Library
        run: pip install requests

      - name: Run Story Generation Script
        run: python main.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Story_Test_Results.md
          git commit -m "Add auto-generated stories from multiple models" || echo "No changes to commit"
          git push
          
