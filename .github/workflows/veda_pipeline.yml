name: PocketFM
on:
  workflow_dispatch:
    inputs:
      start: {description:'Start',required:false,default:'1'}
      end: {description:'End',required:false,default:'200'}
      bs: {description:'Batch',required:false,default:'20'}
      a_only: {description:'A only',required:false,default:false,type:boolean}
      b_only: {description:'B only',required:false,default:false,type:boolean}
      skip: {description:'Skip upload',required:false,default:false,type:boolean}
  schedule: [{cron:'0 2 * * *'}]
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version:'3.11'}
      - run: pip install requests huggingface-hub
      - env:
          HF_TOKEN: ${{secrets.HF_TOKEN}}
          GROQ_API_KEY: ${{secrets.GROQ_API_KEY}}
          NVIDIA_API_KEY: ${{secrets.NVIDIA_API_KEY}}
          GEMINI_API_KEY: ${{secrets.GEMINI_API_KEY}}
        run: |
          mkdir -p outputs
          ARGS="--start ${{github.event.inputs.start||'1'}} --end ${{github.event.inputs.end||'200'}} --batch-size ${{github.event.inputs.bs||'20'}}"
          [ "${{github.event.inputs.a_only}}" == "true" ] && ARGS="$ARGS --track-a-only"
          [ "${{github.event.inputs.b_only}}" == "true" ] && ARGS="$ARGS --track-b-only"
          [ "${{github.event.inputs.skip}}" == "true" ] && ARGS="$ARGS --skip-upload"
          python main.py $ARGS
          
