name: PocketFM Qwen Transcript Batch 20 FAST

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pocketfm-qwen-transcript-batch20-fast
  cancel-in-progress: false

jobs:
  transcribe:
    name: Transcribe Episode 1-200
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check preinstalled FFmpeg
        shell: bash
        run: |
          set -e
          echo "FFmpeg path:"
          which ffmpeg
          ffmpeg -version | head -n 1

      - name: Install Python packages
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run transcription
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u main.py
