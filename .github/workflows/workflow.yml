name: PocketFM Direct Audio to TXT

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pocketfm-direct-audio-txt
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install only Python packages
        run: pip install -r requirements.txt

      - name: Audio to TXT
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python -u main.py
