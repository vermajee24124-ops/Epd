name: Fetch OmniRoute Models

# इसे आप GitHub Actions टैब से मैन्युअली रन कर सकेंगे
on:
  workflow_dispatch: 

permissions:
  contents: write # फाइल को रेपो में वापस सेव करने की परमिशन

jobs:
  build-and-fetch:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Node.js सेट अप करें ताकि OmniRoute इंस्टॉल हो सके
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. OmniRoute को ग्लोबली इंस्टॉल करें
      - name: Install OmniRoute
        run: npm install -g omniroute

      # 3. बैकग्राउंड में OmniRoute चलाएं और थोड़ा इंतज़ार करें
      - name: Start OmniRoute Server
        run: |
          omniroute & 
          echo "Waiting 15 seconds for OmniRoute to start on port 20128..."
          sleep 15
          # चेक करें कि क्या API रिस्पॉन्स दे रहा है
          curl -s http://localhost:20128/v1/models > /dev/null || echo "Server check failed, but continuing..."

      # 4. Python सेट अप करें
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 5. Requests लाइब्रेरी इंस्टॉल करें
      - name: Install Python Dependencies
        run: pip install requests

      # 6. आपका main.py रन करें (यह फाइल बनाएगा)
      - name: Run Python Script
        run: python main.py

      # 7. जो फाइल बनी है, उसे आपके GitHub रेपो में सेव (Commit) कर दें
      - name: Commit and Push the Text File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add omniroute_models_info.txt
          git commit -m "Auto-update OmniRoute models list and details" || echo "No changes to commit"
          git push
          
